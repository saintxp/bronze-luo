<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParticleColophon 原型 — 竖排粒子文案</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a18;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 16px;
    font-family: 'PingFang SC','Noto Sans SC',sans-serif;
    color: #ccc;
  }
  canvas { display: block; border-radius: 8px; background: #f6f1e6; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
  button {
    background: #b64232; color: #fff; border: none; padding: 8px 20px;
    border-radius: 4px; cursor: pointer; font-size: 14px;
  }
  button:hover { background: #d45342; }
  button:disabled { background: #666; cursor: default; }
  .info { font-size: 13px; color: #999; max-width: 600px; text-align: center; line-height: 1.6; }
  select { padding: 6px 10px; border-radius: 4px; background: #333; color: #ccc; border: 1px solid #555; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <select id="sampleSelect">
    <option value="erlitou">壹·二里头 · 铸</option>
    <option value="zhai">贰·周王城 · 宅兹</option>
    <option value="dicheng">叁·东汉 · 地听</option>
    <option value="gui">隋唐 · 归田</option>
  </select>
  <button id="btnAssemble">汇聚</button>
  <button id="btnDisperse" disabled>吹散</button>
  <button id="btnReset">重置</button>
</div>
<div class="info">
  竖排文案 · 粒子汇聚/吹散原型<br>
  粒子数动态计算 · 逐列动画 · 水墨风
</div>

<script>
/* ═══════════════════════════════════════════════
   ParticleColophon Prototype — Phase 0
   验证竖排中文粒子汇聚/吹散可行性
   ═══════════════════════════════════════════════ */

const DISPLAY_SCALE = 0.55; // 原型缩小至 55% 便于在屏幕上完整展示
const CANVAS_W = 1920;
const CANVAS_H = 1080;
const FONT_SIZE = 64; // 离屏渲染字号
const FONT_FAMILY = "'PingFang SC','Noto Serif SC','STSong','SimSun',serif";
const COL_GAP = 1.35; // 列间距系数
const LINE_HEIGHT = 1.05; // 行距系数
const ASSEMBLE_DURATION = 1200; // ms
const HOLD_DURATION = 2500;
const DISPERSE_DURATION = 1000;
const COL_STAGGER = 300; // 列间错开 ms

/* ───────── 测试文案 ───────── */

const SAMPLES = {
  erlitou: {
    color: '#B87333',
    text: [
      '昔夏之方有德也远方图物贡金九牧铸鼎象物',
      '洛阳盆地的第一鼎铜比周鼎早一千年比何尊重八百岁',
      '二里头绿松石矿脉记得铜最初不是礼器是石头',
      '龙尾化绳朝东延伸指向下一座城',
      '——先秦·《左传·宣公三年》',
    ],
  },
  zhai: {
    color: '#5D7A5E',
    text: [
      '唯王初迁宅于成周',
      '何尊一百二十二字铭文劈开洛阳作为中国的元年',
      '土圭测影涧水东瀍水西周公在洛阳盆地画了一个圈',
      '此天下之中九鼎自朝歌迁来',
      '——西周·何尊铭文',
    ],
  },
  dicheng: {
    color: '#C23B22',
    text: [
      '阳嘉元年张衡于洛阳灵台造候风地动仪',
      '精铜铸成八龙衔丸灵台在洛阳南郊十二米夯土台',
      '浑天仪在上地动仪在下',
      '一龙发机铜丸坠入蟾口距洛阳千里之外的地震',
      '被一口铜记住了方向自书典所记未之有也',
      '——南朝宋·《后汉书·张衡传》',
    ],
  },
  gui: {
    color: '#D4A843',
    text: [
      '白居易以刑部尚书致仕居洛阳履道里',
      '与香山僧如满结社白衣鸠杖自称香山居士',
      '以诗稿八百首置香山寺藏经堂',
      '手按诗稿压入经架格层膝盖沾牡丹花瓣',
      '全城牡丹同一帧盛放',
      '归田未竟',
      '——后晋·《旧唐书·白居易传》',
    ],
  },
};

/* ───────── Canvas setup ───────── */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = Math.round(CANVAS_W * DISPLAY_SCALE);
canvas.height = Math.round(CANVAS_H * DISPLAY_SCALE);
const SCALE = canvas.width / CANVAS_W;

/* ───────── Particle types ───────── */

/** @typedef {{ tx:number, ty:number, sx:number, sy:number, ox:number, oy:number, col:number, delay:number }} Particle */

/* ───────── State ───────── */

/** @type {Particle[]} */
let particles = [];
let colCount = 0;
let phase = 'idle'; // idle | assembling | holding | dispersing
let phaseStart = 0;
let activeSample = 'erlitou';

/* ───────── Vertical text → particle sampling ───────── */

function buildParticles(columns, color) {
  // Offscreen canvas: render text at full resolution
  const off = document.createElement('canvas');
  off.width = CANVAS_W;
  off.height = CANVAS_H;
  const octx = off.getContext('2d');

  octx.fillStyle = 'transparent';
  octx.clearRect(0, 0, off.width, off.height);

  const fs = FONT_SIZE;
  const lineH = fs * LINE_HEIGHT;
  const colG = fs * COL_GAP;
  octx.font = `bold ${fs}px ${FONT_FAMILY}`;
  octx.textAlign = 'center';
  octx.textBaseline = 'middle';

  // 计算所有列总高度及起始 Y（垂直居中）
  let maxColHeight = 0;
  for (const col of columns) maxColHeight = Math.max(maxColHeight, col.length * lineH);
  const startY = (off.height - maxColHeight) / 2 + lineH / 2;

  // 计算总宽度及起始 X（水平居中）
  const totalW = (columns.length - 1) * colG;
  const startX = (off.width + totalW) / 2; // 右对齐：从最右列开始

  // 逐列渲染（右→左）
  let cx = startX;
  for (let ci = 0; ci < columns.length; ci++) {
    const col = columns[ci];
    let cy = startY;
    for (const ch of col) {
      octx.fillStyle = color;
      octx.fillText(ch, cx, cy);
      cy += lineH;
    }
    cx -= colG;
  }

  // 采样像素
  const imageData = octx.getImageData(0, 0, off.width, off.height);
  const data = imageData.data;
  const stride = 4;

  /** @type {Particle[]} */
  const pts = [];

  // 计算各列 X 分界线，用于判断像素属于哪一列
  const colBounds = [];
  cx = startX;
  for (let ci = 0; ci < columns.length; ci++) {
    colBounds.push(cx - colG / 2);
    cx -= colG;
  }
  colBounds.push(cx + colG / 2); // 最后一列左边界

  // 总采样区域中心
  let sumX = 0, sumY = 0, countN = 0;

  // 步长采样以减少粒子数（大号字 64px，隔 2 像素采样即可）
  const step = 3;
  for (let py = 0; py < off.height; py += step) {
    for (let px = 0; px < off.width; px += step) {
      const idx = (py * off.width + px) * stride;
      const a = data[idx + 3];
      if (a < 80) continue; // 过滤透明/极淡像素

      // 判定所属列
      let colIdx = columns.length - 1;
      for (let ci = 0; ci < colBounds.length - 1; ci++) {
        if (px >= colBounds[ci + 1] && px <= colBounds[ci]) {
          colIdx = ci;
          break;
        }
      }

      pts.push({
        tx: px, ty: py,
        sx: px, sy: py,
        ox: px, oy: py,
        col: colIdx,
        delay: 0,
      });
      sumX += px; sumY += py;
      countN++;
    }
  }

  const centerX = sumX / countN;
  const centerY = sumY / countN;
  const spreadR = Math.max(off.width, off.height) * 0.6;

  // 分散起始位置
  for (const p of pts) {
    const angle = Math.random() * Math.PI * 2;
    const dist = spreadR * (0.5 + Math.random() * 0.5);
    p.sx = centerX + Math.cos(angle) * dist;
    p.sy = centerY + Math.sin(angle) * dist * 0.6;
    p.ox = p.sx; p.oy = p.sy;
    // 吹散目标方向：偏东(右) + 随机
    const windAngle = (Math.PI * 3) / 2 + (Math.random() - 0.5) * 1.2; // 向左下飘散
    const windDist = spreadR * (0.6 + Math.random() * 0.8);
    p.dx = Math.cos(windAngle) * windDist;
    p.dy = Math.sin(windAngle) * windDist;
  }

  return { particles: pts, colCount: columns.length };
}

/* ───────── Easing ───────── */

function easeOutExpo(t) { return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t); }
function easeInQuad(t) { return t * t; }
function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

/* ───────── Render loop ───────── */

function render(now) {
  ctx.save();
  ctx.scale(SCALE, SCALE);

  // 纸色背景
  ctx.fillStyle = '#f6f1e6';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (phase === 'idle' || particles.length === 0) {
    ctx.restore();
    return;
  }

  const elapsed = now - phaseStart;

  // 逐列状态
  for (let ci = 0; ci < colCount; ci++) {
    const colParticles = particles.filter(p => p.col === ci);
    if (colParticles.length === 0) continue;

    const colDelay = (colCount - 1 - ci) * COL_STAGGER; // 右列先

    let colPhase;
    if (phase === 'assembling' || phase === 'holding') {
      const colElapsed = elapsed - colDelay;
      if (colElapsed <= 0) colPhase = 'scattered';
      else if (colElapsed <= ASSEMBLE_DURATION) colPhase = 'assembling';
      else colPhase = 'holding';
    } else {
      // dispersing
      const colElapsed = elapsed - ci * COL_STAGGER; // 左列先散
      if (colElapsed <= 0) colPhase = 'holding';
      else if (colElapsed <= DISPERSE_DURATION) colPhase = 'dispersing';
      else colPhase = 'done';
    }

    let posFn;
    if (colPhase === 'scattered') posFn = p => [p.sx, p.sy];
    else if (colPhase === 'assembling') {
      const t = easeOutExpo(elapsed / ASSEMBLE_DURATION);
      posFn = p => [p.sx + (p.tx - p.sx) * t, p.sy + (p.ty - p.sy) * t];
    } else if (colPhase === 'dispersing') {
      const t = easeInQuad(elapsed / DISPERSE_DURATION);
      posFn = p => [p.tx + p.dx * t, p.ty + p.dy * t];
    } else {
      posFn = p => [p.tx, p.ty];
    }

    // 渲染该列粒子
    const sample = SAMPLES[activeSample];
    ctx.fillStyle = sample.color;
    for (const p of colParticles) {
      const [px, py] = posFn(p);
      ctx.fillRect(px, py, 1.8, 1.8);
    }
  }

  ctx.restore();
}

/* ───────── Animation frame ───────── */

let animId = null;

function loop(now) {
  render(now);
  animId = requestAnimationFrame(loop);
}

/* ───────── Actions ───────── */

function loadSample(key) {
  activeSample = key;
  const sample = SAMPLES[key];
  const result = buildParticles(sample.text, sample.color);
  particles = result.particles;
  colCount = result.colCount;
  phase = 'idle';
  updateButtons();
  console.log(`Loaded "${key}": ${particles.length} particles, ${colCount} columns`);
}

function doAssemble() {
  if (particles.length === 0) loadSample(activeSample);
  phase = 'assembling';
  phaseStart = performance.now();

  // 延迟转 holding
  const totalDuration = ASSEMBLE_DURATION + (colCount - 1) * COL_STAGGER;
  setTimeout(() => {
    if (phase === 'assembling') {
      phase = 'holding';
      phaseStart = performance.now();
      updateButtons();
    }
  }, totalDuration);
  updateButtons();
}

function doDisperse() {
  phase = 'dispersing';
  phaseStart = performance.now();

  const totalDuration = DISPERSE_DURATION + (colCount - 1) * COL_STAGGER;
  setTimeout(() => {
    if (phase === 'dispersing') {
      phase = 'idle';
      updateButtons();
    }
  }, totalDuration);
  updateButtons();
}

function doReset() {
  phase = 'idle';
  phaseStart = 0;
  loadSample(activeSample);
}

function updateButtons() {
  document.getElementById('btnAssemble').disabled = phase !== 'idle';
  document.getElementById('btnDisperse').disabled = phase !== 'holding';
}

/* ───────── Init ───────── */

document.getElementById('btnAssemble').addEventListener('click', doAssemble);
document.getElementById('btnDisperse').addEventListener('click', doDisperse);
document.getElementById('btnReset').addEventListener('click', doReset);
document.getElementById('sampleSelect').addEventListener('change', e => {
  loadSample(e.target.value);
});

loadSample('erlitou');
animId = requestAnimationFrame(loop);
</script>
</body>
</html>
