<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>铜声·识洛</title>
    <style>
      /* ── InkView 色板 ── */
      :root {
        --ink-bg: #f6f1e6;
        --ink-paper: #fffaf0;
        --ink-text: #201c18;
        --ink-muted: #6f675d;
        --ink-line: #2a2723;
        --ink-cinnabar: #b64232;
        --ink-gold: #c8a65a;
        --bronze-copper: #b87333;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--ink-bg);
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      /* ── 启动页面 ── */
      #start-page {
        position: absolute;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--ink-bg);
        font-family: "PingFang SC", "Noto Sans SC", "SimSun", serif;
        transition: opacity 0.6s ease;
      }
      #start-page.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #start-page .seal {
        width: 90px;
        height: 90px;
        border: 3px solid var(--ink-cinnabar);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 36px;
      }
      #start-page .seal span {
        color: var(--ink-cinnabar);
        font-size: 34px;
        font-weight: bold;
        letter-spacing: 4px;
      }

      #start-page h1 {
        color: var(--ink-text);
        font-size: 48px;
        font-weight: bold;
        letter-spacing: 8px;
        margin-bottom: 16px;
      }

      #start-page .subtitle {
        color: var(--ink-muted);
        font-size: 18px;
        letter-spacing: 4px;
        margin-bottom: 60px;
      }

      #start-page .start-btn {
        padding: 14px 64px;
        background: transparent;
        border: 1.5px solid var(--ink-line);
        color: var(--ink-text);
        font-size: 20px;
        font-family: inherit;
        letter-spacing: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      #start-page .start-btn:hover {
        background: var(--ink-line);
        color: var(--ink-bg);
      }

      #start-page .footer-note {
        position: absolute;
        bottom: 40px;
        color: var(--ink-muted);
        font-size: 13px;
        letter-spacing: 2px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- 启动页面 -->
    <div id="start-page">
      <div class="seal"><span>识洛</span></div>
      <h1>铜声·识洛</h1>
      <p class="subtitle">一座城的青铜记忆</p>
      <button class="start-btn" id="btn-start">开始游戏</button>
      <p class="footer-note">A Gorogoa-like · 洛阳 3800 年</p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
